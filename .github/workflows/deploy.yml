name: Deploy to AWS EKS

# ─────────────────────────────────────────────
# Trigger — runs automatically on every push
# to the main branch
# ─────────────────────────────────────────────
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:

      # ─────────────────────────────────────────
      # Step 1 — Checkout the DevOps repo
      # Gets the latest Dockerfile and K8s manifests
      # ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────
      # Step 2 — Login to Docker Hub
      # Uses secrets — credentials never in code
      # ─────────────────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v + Node24 env
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ─────────────────────────────────────────
      # Step 3 — Build Docker image
      # GitHub Actions server builds the image —
      # your laptop does zero heavy lifting
      # Dockerfile clones Multi-agent-system repo
      # ─────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/multi-agent-manufacturing-system:latest .

      # ─────────────────────────────────────────
      # Step 4 — Push image to Docker Hub
      # AWS EKS will pull from here
      # ─────────────────────────────────────────
      - name: Push Docker image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/multi-agent-manufacturing-system:latest

      # ─────────────────────────────────────────
      # Step 5 — Configure AWS credentials
      # Connects GitHub Actions to your AWS account
      # using the secrets you added
      # ─────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4 + Node24 env
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # ─────────────────────────────────────────
      # Step 6 — Update kubeconfig
      # Connects kubectl to your AWS EKS cluster
      # ─────────────────────────────────────────
      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name multi-agent-cluster

      # ─────────────────────────────────────────
      # Step 7 — Deploy to EKS
      # Applies both K8s manifests to the cluster
      # K8s detects the new image and triggers
      # a zero-downtime rolling update
      # ─────────────────────────────────────────
      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      # ─────────────────────────────────────────
      # Step 8 — Verify rolling update
      # Waits until all pods are running the
      # new version before marking pipeline success
      # ─────────────────────────────────────────
      - name: Verify deployment rollout
        run: |
          kubectl rollout status deployment/multi-agent-manufacturing --timeout=300s

      # ─────────────────────────────────────────
      # Step 9 — Show running pods
      # Confirms new pods are healthy after deploy
      # ─────────────────────────────────────────
      - name: Show running pods
        run: |
          kubectl get pods
          kubectl get services
