apiVersion: v1
kind: Service
metadata:
  name: multi-agent-manufacturing-service  # Name of this service in K8s
  labels:
    app: multi-agent-manufacturing

spec:
  # ─────────────────────────────────────────────
  # NodePort exposes the app on a port on your
  # local machine so you can access it in browser.
  # Perfect for Docker Desktop / local K8s.
  #
  # Other types:
  # ClusterIP   → internal only (no browser access)
  # LoadBalancer → cloud providers (AWS, GCP etc.)
  # NodePort    → local/dev clusters ✅ our choice
  # ─────────────────────────────────────────────
  type: LoadBalancer

  # ─────────────────────────────────────────────
  # Selector — routes traffic to pods with this label
  # Must match the labels in deployment.yaml
  # ─────────────────────────────────────────────
  selector:
    app: multi-agent-manufacturing

  ports:
    - name: streamlit
      protocol: TCP
      port: 80              # Port the Service listens on (inside cluster)
      targetPort: 8501      # Port the container is running on
      nodePort: 30001       # Port exposed on your machine
                            # Access app at http://localhost:30001
